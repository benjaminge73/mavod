[pytest]
markers =
    unit: Tests unitaires (rapides, mockés, < 5s total). Lancés à chaque PR.
    integration: Tests d'intégration (APIs externes réelles). Lancés à la demande via RUN_INTEGRATION=1.
    e2e: Tests end-to-end (workflow complet, ~30-60s par test). Lancés via RUN_E2E=1 ou workflow GitHub manuel.
addopts = -ra --strict-markers
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning:telegram.*
    ignore::PendingDeprecationWarning
